name: Build and push Docker image

on:
  push:
    branches: [main]

jobs:
# parallel build and push jobs
  build-and-push1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Docker Build
        run: |
          echo "{{ vars.ENV_FILE }}" > .env
          ls -la 
          cat .env
          docker build -t netflix_backend:latest .

