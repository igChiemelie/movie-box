name: Build and push Docker image

# Define the trigger for the workflow
on:
  push:
    branches: [master]

# Define the jobs to be run
jobs:
# sequential/serial build and push jobs
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Docker Build-frontend
        run: |
          hostnamectl

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      
      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Build and push Docker image to Amazon ECR
      - name: Docker Build
        run: |
          docker build -t movie-box-frontend:latest .

      - name: Docker push
        run: |
          docker tag movie-box-frontend:latest 638775532340.dkr.ecr.us-east-1.amazonaws.com/movie-box-frontend:${GITHUB_RUN_NUMBER}
          docker push 638775532340.dkr.ecr.us-east-1.amazonaws.com/movie-box-frontend:${GITHUB_RUN_NUMBER}    